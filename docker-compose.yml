version: '3.8'

services:
  eidolon:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS__URL=redis://redis:6379
      - RUST_LOG=info
      # Override config values via environment variables (using double underscore separator)
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    # Optional: Enable persistence
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis-data:
