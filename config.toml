[server]
port = 3000
host = "0.0.0.0"

[redis]
url = "redis://127.0.0.1:6379"
ttl_seconds = 3600 # 1 hour

[security]
fail_open = false
# IMPORTANT: Change this to a unique 32-character secret before deploying.
# Override via SECURITY__ENCRYPTION_KEY environment variable.
encryption_key = "change-me-to-32-char-secret-!!!!"

[ollama]
base_url = "http://localhost:11434"

[logging]
level = "info"

[[custom]]
name = "PROJECT_ID"
regex = "Project-\\d{4}"  # Matches "Project-1234"

[rate_limit]
requests_per_second = 20
burst_size = 10

[nlp]
model_path = "assets/bert-ner-quantized.onnx"
tokenizer_path = "assets/tokenizer.json"

[policy]
redact_email = true
redact_cc = true
redact_ip = true
redact_ssn = true
redact_apikey = true
redact_ner_person = true
redact_ner_location = true
redact_ner_org = true

[shield]
# model_path = "assets/deberta-v3-base-prompt-injection.onnx"
# tokenizer_path = "assets/shield-tokenizer.json"
